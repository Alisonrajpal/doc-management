issuer: OpenAI OpCo, LLC
keywords:
  - OpenAI
  - OpCo
  - "1455 3rd Street"
fields:
  vendor_name:
    value: OpenAI OpCo, LLC
    type: static
  invoice_number:
    regex: 'Invoice number\s+([A-Z0-9\-]+)'
    type: regex
  date:
    regex: 'Date of issue\s+(\w+\s+\d{1,2},?\s+\d{4})'
    type: regex
  amount:
    regex: 'Amount due\s*R\s*(\d+(?:\.\d{2})?)'
    type: regex
  vat:
    regex: 'VAT[^R]*R\s*(\d{2}\.\d{2})'
    type: regex
options:
  currency: ZAR
  remove_whitespace: true
